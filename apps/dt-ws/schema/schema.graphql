"""A tracked issue created from analysis findings, linked to affected model elements."""
type Issue implements Element  @authentication @node {
  "Unique identifier"
  id: ID! @id
  "Issue name"
  name: String!
  "Free-text description"
  description: String
  "Issue type"
  type: String
  "Issue category"
  category: String
  "Current status (e.g., open, in_progress, resolved)"
  issueStatus: String
  "Discussion comments"
  comments: [String!]
  # Explicit per-type relationships (the Element interface can't be used here for performance reasons)
  "Affected models"
  models: [Model!]! @relationship(type: "HAS_ISSUE", direction: IN)
  "Affected components"
  components: [Component!]! @relationship(type: "HAS_ISSUE", direction: IN)
  "Affected data flows"
  dataFlows: [DataFlow!]! @relationship(type: "HAS_ISSUE", direction: IN)
  "Affected security boundaries"
  securityBoundaries: [SecurityBoundary!]! @relationship(type: "HAS_ISSUE", direction: IN)
  "Affected controls"
  controls: [Control!]! @relationship(type: "HAS_ISSUE", direction: IN)
  "Affected data elements"
  data: [Data!]! @relationship(type: "HAS_ISSUE", direction: IN)
  "Related analyses"
  analyses: [Analysis!]! @relationship(type: "HAS_ISSUE", direction: IN)
  "Related exposures"
  exposures: [Exposure!]! @relationship(type: "HAS_ISSUE", direction: IN)
  "Related countermeasures"
  countermeasures: [Countermeasure!]! @relationship(type: "HAS_ISSUE", direction: IN)
  "External system attributes (JSON string)"
  attributes: String
  "Timestamp of last external sync"
  lastSyncAt: String
  "Creation timestamp"
  createdAt: String
  "Last update timestamp"
  updatedAt: String
  "Attributes synced from external system (resolved at runtime)"
  syncedAttributes: JSON @customResolver(requires: "id lastSyncAt attributes issueClass { module { name } }")
  "Class this issue is an instance of"
  issueClass: [IssueClass!]! @relationship(type: "IS_INSTANCE_OF", direction: OUT)
  "All linked elements with model context and exposure info (computed via Cypher)"
  elementsWithExtendedInfo: [IssueElement!]! @cypher(
    statement: """
    MATCH (this)-[:HAS_ISSUE]-(e)
    OPTIONAL MATCH (e)-[:CONTAINS|BELONGS_TO|FLOWS|HANDLES|HAS_EXPOSURE|ANALYZED_BY*1..10]-(m:Model)
    OPTIONAL MATCH (e)<-[:HAS_EXPOSURE]-(c)
    RETURN DISTINCT {
      id: e.id,
      name: e.name,
      description: e.description,
      type: COALESCE(e.type, labels(e)[0]),
      element_type: labels(e)[0],
      category: COALESCE(e.category, ''),
      model_id: CASE WHEN 'Model' IN labels(e) THEN e.id ELSE m.id END,
      model_name: CASE WHEN 'Model' IN labels(e) THEN e.name ELSE m.name END,
      model_description: CASE WHEN 'Model' IN labels(e) THEN e.description ELSE m.description END,
      exposed_component_id: COALESCE(c.id, ''),
      exposed_component_name: COALESCE(c.name, ''),
      exposed_component_description: COALESCE(c.description, '')
    } AS issueElement
    """
    columnName: "issueElement"
  )
}

"""An issue class definition provided by a module."""
type IssueClass implements Element @authentication @node {
