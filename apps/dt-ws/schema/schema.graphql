  dataFlow: [DataFlow!]! @relationship(type: "HANDLES", direction: IN)
  securityBoundary: [SecurityBoundary!]! @relationship(type: "HANDLES", direction: IN)
  elements: [Element!]! @relationship(type: "HANDLES", direction: IN)
  exposures: [Exposure!]! @relationship(type: "HAS_EXPOSURE", direction: OUT)
  analyses: [Analysis!]! @relationship(type: "ANALYZED_BY", direction: OUT)
  issues: [Issue!]! @relationship(type: "HAS_ISSUE", direction: OUT) # Issues associated with the data
}

type Control implements Element  @authentication @node {
  id: ID! @id # Unique identifier for the threat modification
