  type: String # Type of the threat modification (e.g., technical, procedural)
  category: String # Category of the threat modification 
  controlClasses: [ControlClass!]! @relationship(type: "IS_INSTANCE_OF", direction: OUT) # Threat modification class for this threat modification
  elements: [Element!]! @relationship(type: "SUPPORTS", direction: OUT) # Elements supported by this threat modification
  countermeasures: [Countermeasure!]! @relationship(type: "HAS_COUNTERMEASURE", direction: OUT) # Countermeasures associated with this threat modification
  folder: [Folder!]! @relationship(type: "FOLDER_CONTAINS", direction: IN)
