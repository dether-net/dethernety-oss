  "Control class this countermeasure belongs to"
  controlClass: [ControlClass!]! @relationship(type: "IS_COUNTERMEASURE_OF", direction: OUT)
  "Issues associated with this countermeasure"
  issues: [Issue!]! @relationship(type: "HAS_ISSUE", direction: OUT)
}

