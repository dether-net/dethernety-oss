  "Controls being analyzed"
  control: [Control!]! @relationship(type: "ANALYZED_BY", direction: IN)
  "Data elements being analyzed"
  data: [Data!]! @relationship(type: "ANALYZED_BY", direction: IN)
  "All elements being analyzed"
