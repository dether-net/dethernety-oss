#graphql

scalar JSON

## Enum to define the different types of components (e.g., process, database, service)
enum ComponentType {
  PROCESS
  EXTERNAL_ENTITY
  STORE
  BOUNDARY
  SECURITY_BOUNDARY
  DATA_FLOW
}

## Enum to define the trust level of security boundaries
enum TrustLevel {
  UNTRUSTED
  SEMI_TRUSTED
  TRUSTED
}


## Enum for Value Type
enum ValueType {
  STRING
  NUMBER
  BOOLEAN
  DATE
}

####################################################################################################
## Core Types for the model, components, threats, mitigations, etc.

interface Element {
  id: ID!
  name: String!
  description: String
}

type Folder implements Element @authentication @node {
  id: ID! @id
  name: String!
  description: String
  parentFolder: [Folder!]! @relationship(type: "FOLDER_CONTAINS", direction: IN)
  childrenFolders: [Folder!]! @relationship(type: "FOLDER_CONTAINS", direction: OUT)
  models: [Model!]! @relationship(type: "FOLDER_CONTAINS", direction: OUT)
  controls: [Control!]! @relationship(type: "FOLDER_CONTAINS", direction: OUT)
}

## Model represents the system model containing components, data flows, and threats
type Model implements Element  @authentication @node {
  id: ID! @id
  name: String!
  description: String # Optional description of the model
  defaultBoundary: [SecurityBoundary!]! @relationship(type: "CONTAINS", direction: OUT) # Security boundaries within the model
  modules: [Module!]! @relationship(type: "HAS_MODULE", direction: OUT) # Modules associated with the model
  controls: [Control!]! @relationship(type: "SUPPORTS", direction: IN) # Controls supported by this component
  dataItems: [Data!]! @relationship(type: "CONTAINS", direction: OUT) # Data elements within the model
  representedBy: [Element!]! @relationship(type: "REPRESENTS_MODEL", direction: IN) # Components representing the model
  analyses: [Analysis!]! @relationship(type: "ANALYZED_BY", direction: OUT) # Analyses associated with the model
  issues: [Issue!]! @relationship(type: "HAS_ISSUE", direction: OUT) # Issues associated with the model
  folder: [Folder!]! @relationship(type: "FOLDER_CONTAINS", direction: IN)
}

## Component represents a key entity in the system (e.g., process, database)
type Component implements Element  @authentication @node {
  id: ID! @id
  name: String!
  description: String # Optional description of the component
  type: ComponentType! # Type of component (e.g., process, database)
  parentBoundary: [SecurityBoundary!]! @relationship(type: "BELONGS_TO", direction: OUT) # Security boundary containing this component
  flowsFrom: [DataFlow!]! @relationship(type: "FLOWS", direction: OUT) # Data flows originating from this component
  flowsTo: [DataFlow!]! @relationship(type: "FLOWS", direction: IN) # Data flows targeting this component
  exposures: [Exposure!]! @relationship(type: "HAS_EXPOSURE", direction: OUT) # Exposures associated with this component
  controls: [Control!]! @relationship(type: "SUPPORTS", direction: IN) # Controls supported by this component
  dataItems: [Data!]! @relationship(type: "HANDLES", direction: OUT) # Data elements handled by this component
  componentClass: [ComponentClass!]! @relationship(type: "IS_INSTANCE_OF", direction: OUT) # Component class for this component
  representedModel: [Model!]! @relationship(type: "REPRESENTS_MODEL", direction: OUT) # Model represented by this component
  analyses: [Analysis!]! @relationship(type: "ANALYZED_BY", direction: OUT) # Analyses associated with this component
  issues: [Issue!]! @relationship(type: "HAS_ISSUE", direction: OUT) # Issues associated with the component
  positionX: Float # X-coordinate of the component on the canvas
  positionY: Float # Y-coordinate of the component on the canvas
  dimensionsWidth: Float # Width of the component on the canvas
  dimensionsHeight: Float # Height of the component on the canvas
}

## Data flow represents the flow of data between two components in the model
type DataFlow implements Element  @authentication @node {
  id: ID! @id
  name: String! # Custom name of the data flow
  description: String # Optional description of the data flow
  source: [Component!]! @relationship(type: "FLOWS", direction: IN) # Source component of the data flow
  target: [Component!]! @relationship(type: "FLOWS", direction: OUT) # Target component of the data flow
  sourceHandle: String # Handle for the source component
  targetHandle: String # Handle for the target component
  dataFlowTypes: [String!] # Types of data flow (e.g., request, response)
  analyses: [Analysis!]! @relationship(type: "ANALYZED_BY", direction: OUT) # Analyses associated with this data flow
  exposures: [Exposure!]! @relationship(type: "HAS_EXPOSURE", direction: OUT) # Exposures associated with this data flow
  controls: [Control!]! @relationship(type: "SUPPORTS", direction: IN) # Controls supported by this data flow
  dataItems: [Data!]! @relationship(type: "HANDLES", direction: OUT) # Data elements handled by this data flow
  dataFlowClass: [DataFlowClass!]! @relationship(type: "IS_INSTANCE_OF", direction: OUT) # Data flow class for this data flow
  issues: [Issue!]! @relationship(type: "HAS_ISSUE", direction: OUT) # Issues associated with the data flow
}

## Security boundary represents a trust boundary within the system (e.g., network boundary)
type SecurityBoundary implements Element  @authentication @node {
  id: ID! @id
  name: String!
  description: String
  model: [Model!]! @relationship(type: "CONTAINS", direction: IN) # Model containing this security boundary
  trustLevel: TrustLevel! # Trust level of the boundary (e.g., untrusted, semi-trusted)
  components: [Component!]! @relationship(type: "BELONGS_TO", direction: IN) # Component within the security boundary
  childBoundaries: [SecurityBoundary!]! @relationship(type: "BELONGS_TO", direction: IN) # Security boundary contained within this component
  parentBoundary: [SecurityBoundary!]! @relationship(type: "BELONGS_TO", direction: OUT) # Security boundary containing this component
  exposures: [Exposure!]! @relationship(type: "HAS_EXPOSURE", direction: OUT) # Exposures associated with this security boundary
  controls: [Control!]! @relationship(type: "SUPPORTS", direction: IN) # Controls supports this security boundary
  dataItems: [Data!]! @relationship(type: "HANDLES", direction: OUT) # Data elements handled by this security boundary
  securityBoundaryClass: [SecurityBoundaryClass!]! @relationship(type: "IS_INSTANCE_OF", direction: OUT) # Security boundary class for this security boundary
  representedModel: [Model!]! @relationship(type: "REPRESENTS_MODEL", direction: OUT) # Model represented by this component
  analyses: [Analysis!]! @relationship(type: "ANALYZED_BY", direction: OUT) # Analyses associated with this security boundary
  issues: [Issue!]! @relationship(type: "HAS_ISSUE", direction: OUT) # Issues associated with the security boundary
  positionX: Float # X-coordinate of the component on the canvas
  positionY: Float # Y-coordinate of the component on the canvas
  dimensionsWidth: Float # Width of the component on the canvas
  dimensionsHeight: Float # Height of the component on the canvas
  dimensionsMinWidth: Float # Minimum width of the component on the canvas
  dimensionsMinHeight: Float # Minimum height of the component on the canvas
  allDescendantBoundaries: [SecurityBoundary!]!
    @cypher(
      statement: """
      MATCH (this)<-[:BELONGS_TO*1..10]-(sb:SecurityBoundary)
      RETURN DISTINCT sb
      """,
      columnName: "sb"
    )

  allDescendantComponents: [Component!]!
    @cypher(
      statement: """
      MATCH (this)<-[:BELONGS_TO*0..10]-(sb:SecurityBoundary)
      WITH DISTINCT sb
      MATCH (sb)<-[:BELONGS_TO]-(c:Component)
      RETURN DISTINCT c
      """,
      columnName: "c"
    )

  allDescendantDataFlows: [DataFlow!]!
    @cypher(
      statement: """
      MATCH (this)<-[:BELONGS_TO*0..10]-(sb:SecurityBoundary)
      WITH DISTINCT sb
      MATCH (sb)<-[:BELONGS_TO]-(c:Component)
      WITH DISTINCT c
      MATCH (c)-[:FLOWS]-(df:DataFlow)
      RETURN DISTINCT df
      """,
      columnName: "df"
    )
}

