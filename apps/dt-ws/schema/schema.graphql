"""Statistics returned after deleting a model."""
type DeletionStats @authentication @node {
  "Number of graph nodes deleted"
  nodesDeleted: Int!
  "Number of graph relationships deleted"
  relationshipsDeleted: Int!
}

"""An analysis session identifier."""
type Session {
  "Session ID for subscribing to analysis results via streamResponse"
  sessionId: ID!
}

"""Result of adding elements to an issue."""
type AddElementsToIssueResult {
  "Number of elements successfully added"
  elementsAdded: String!
}

type Mutation {
  "Link one or more elements to an issue"
  addElementsToIssue(
    issueId: String!
    elementIds: [String!]!
  ): AddElementsToIssueResult!
    @cypher(
      statement: """
      MATCH (issue:Issue {id: $issueId})
      UNWIND $elementIds as elementId
      MATCH (element {id: elementId})
      WHERE any(label IN labels(element) WHERE label IN ['Model','Component','DataFlow','SecurityBoundary','Control','Data','Analysis','Exposure','Countermeasure'])
      MERGE (issue)<-[:HAS_ISSUE]-(element)
      RETURN DISTINCT {
        elementsAdded: size(collect(element))
      } AS result
      """
      columnName: "result"
    )
    @authentication

  "Remove an element from an issue"
  removeElementFromIssue(
    issueId: String!
    elementId: String!
  ): Boolean!
    @cypher(
      statement: """
      MATCH (issue:Issue {id: $issueId})<-[r:HAS_ISSUE]-(element {id: $elementId})
      WHERE any(label IN labels(element) WHERE label IN ['Model','Component','DataFlow','SecurityBoundary','Control','Data','Analysis','Exposure','Countermeasure'])
      DELETE r
      RETURN TRUE as result
      """
      columnName: "result"
    )
    @authentication

  "Set configuration attributes on a component's class instantiation relationship"
  setInstantiationAttributes(
    componentId: String!
    classId: String!
    attributes: JSON!
  ): Boolean!
    @authentication

  "Reset a module, clearing its cached state and reloading from disk"
  resetModule(moduleId: ID!): Boolean!
    @authentication

  "Delete a model and all its contained elements (boundaries, components, data flows, exposures)"
  deleteModel(modelId: ID!): DeletionStats!
    @cypher(
      statement: """
      MATCH (model:Model {id: $modelId})-[:CONTAINS]->(defbound:SecurityBoundary)
      OPTIONAL MATCH (defbound)<-[:BELONGS_TO*0..]-(secbound:SecurityBoundary)
      OPTIONAL MATCH (secbound)<-[:BELONGS_TO]-(comp:Component)
      OPTIONAL MATCH (comp)-[:FLOWS]-(flow:DataFlow)
      OPTIONAL MATCH (comp)-[:HANDLES]->(compdat:Data)
      OPTIONAL MATCH (flow)-[:HANDLES]->(flowdat:Data)
      OPTIONAL MATCH (secbound)-[:HANDLES]->(bounddat:Data)
      OPTIONAL MATCH (comp)-[:HAS_EXPOSURE]->(excomp:Exposure)
      OPTIONAL MATCH (flow)-[:HAS_EXPOSURE]->(exflow:Exposure)
      OPTIONAL MATCH (secbound)-[:HAS_EXPOSURE]->(exbound:Exposure)
      OPTIONAL MATCH (compdat)-[:HAS_EXPOSURE]->(exdat:Exposure)
      OPTIONAL MATCH (flowdat)-[:HAS_EXPOSURE]->(exflowdat:Exposure)
      OPTIONAL MATCH (bounddat)-[:HAS_EXPOSURE]->(exbounddat:Exposure)
      // Collect all nodes into a single list
      WITH collect(model) + collect(defbound) + collect(secbound) 
          + collect(comp) + collect(flow) + collect(compdat) 
          + collect(flowdat) + collect(bounddat)
          + collect(excomp) + collect(exflow) + collect(exbound)
          + collect(exdat) + collect(exflowdat) as nodesToDelete

      // Remove null entries and get distinct nodes
      UNWIND nodesToDelete as n
      WITH collect(distinct n) as distinctNodes

      // Count relationships that will be deleted
      UNWIND distinctNodes as dn
      MATCH (dn)-[r]-()
      WITH distinctNodes, count(r) as relCount

      // Delete all nodes
      UNWIND distinctNodes as node
      DETACH DELETE node

      // Return stats
      RETURN DISTINCT { 
        nodesDeleted: size(distinctNodes), 
        relationshipsDeleted: relCount 
      } AS result
      """
      columnName: "result"
    )
    @authentication

  "Start an analysis run, returns a session ID for subscribing to results"
  runAnalysis(
    analysisId: String!
    additionalParams: JSON
  ): Session!
    @authentication

  "Start a chat session with an analysis agent"
  startChat(
    analysisId: String!
    userQuestion: String!
    additionalParams: JSON
  ): Session!
    @authentication

  "Resume a paused analysis with user input (human-in-the-loop)"
  resumeAnalysis(
    analysisId: String!
    userInput: String!
  ): Session!
    @authentication

  "Delete an analysis and its associated data"
  deleteAnalysis(
    analysisId: String!
  ): Boolean!
    @authentication
}

type Query {
  "Get all exposures attached to a specific element"
  getExposuresForElement(elementId: String!): [Exposure!]!
    @cypher(
      statement: """
      MATCH (e {id: $elementId})-[:HAS_EXPOSURE]->(ex:Exposure)
      RETURN ex
      """
      columnName: "ex"
    )
    @authentication

  "Get the instantiation attributes from a component-to-class relationship"
  getAttributesFromClassRel(
    componentId: String!
    classId: String!
  ): JSON
    @cypher(
      statement: """
      MATCH (c {id: $componentId})
      MATCH (t {id: $classId})
      OPTIONAL MATCH (c)-[r:IS_INSTANCE_OF]->(t)
      RETURN COALESCE(r, {}) AS attributes
      """
      columnName: "attributes"
    )
    @authentication

  "Get models that are not already represented by a component in the given model"
  getNotRepreseningModels(
    modelId: String!
  ): [Model!]
    @cypher(
      statement: """
      MATCH (src:Model {id:$modelId})
      MATCH (src)<-[:REPRESENTS_MODEL]-(comp)
      MATCH (comp)-[:BELONGS_TO|CONTAINS*1..]-(mod:Model)
      WITH COLLECT(DISTINCT mod) AS connectedModels
      MATCH (m:Model)
      WHERE m.id <> $modelId
        AND NOT m IN connectedModels
      RETURN m
      """
      columnName: "m"
    )
    @authentication

  "Get analysis result values by key"
  getAnalysisValues(
    analysisId: String!
    valueKey: String!
  ): JSON!
    @authentication

  "Get a document from the analysis document store"
  getDocument(
    analysisId: String!
    filter: JSON!
  ): JSON!
    @authentication

  "List module names that have frontend bundles available"
  getAvailableFrontendModules: [String!]!
    @authentication

  "Get the compiled frontend bundle for a module"
  getModuleFrontendBundle(moduleName: String!): String!
    @authentication
}

"""Metadata about the AI model response."""
type ResponseMetadata {
  "Why the model stopped generating (e.g., stop, length, tool_use)"
  finish_reason: String
  "Name of the AI model that produced the response"
  model_name: String
  "Backend system fingerprint for reproducibility"
  system_fingerprint: String
}

"""A streamed response from an AI analysis agent."""
type AIResponse {
  "Text content of the response"
  content: String
  "Provider-specific extra fields"
  additional_kwargs: JSON
  "Model response metadata (finish reason, model name)"
  response_metadata: ResponseMetadata
  "Message type (e.g., ai, human, tool)"
  type: String
  "Agent or tool name"
  name: String
  "Message identifier"
  id: String
  "Whether this is an example message used for few-shot prompting"
  example: Boolean
  "Tool calls requested by the agent"
  tool_calls: [JSON!]
  "Tool calls that failed validation"
  invalid_tool_calls: [JSON!]
  "Token usage statistics"
  usage_metadata: JSON
  "Partial tool call data from streaming chunks"
  tool_call_chunks: [JSON!]
}

# Note: @authentication is not supported on Subscription by @neo4j/graphql v7.
# Subscription auth is enforced by JwtAuthGuard on the controller.
type Subscription {
  "Subscribe to streamed AI responses for a given analysis session"
  streamResponse(sessionId: String!): AIResponse!
}
