  "Available value keys for retrieving analysis results (resolved at runtime)"
  valueKeys: [String!]! @customResolver(requires: "id analysisClass { id module { name } }")
  "Model being analyzed"
  model: [Model!]! @relationship(type: "ANALYZED_BY", direction: IN)
  "Components being analyzed"
  component: [Component!]! @relationship(type: "ANALYZED_BY", direction: IN)
  "Data flows being analyzed"
