#graphql

scalar JSON

"""Component type (process, database, external entity, etc.)."""
enum ComponentType {
  "A running process or service"
  PROCESS
  "An external actor or system outside the model boundary"
  EXTERNAL_ENTITY
  "A data store (database, file system, cache)"
  STORE
  "A logical grouping boundary"
  BOUNDARY
  "A trust boundary separating zones of different trust levels"
  SECURITY_BOUNDARY
  "A data flow connection between components"
  DATA_FLOW
}

"""Trust level assigned to a security boundary."""
enum TrustLevel {
  "No trust — external or hostile zone"
  UNTRUSTED
  "Partial trust — DMZ or shared zone"
  SEMI_TRUSTED
  "Full trust — internal or protected zone"
  TRUSTED
}

"""Value types for dynamic attributes."""
enum ValueType {
  "A text value"
  STRING
  "A numeric value (integer or float)"
  NUMBER
  "A true/false value"
  BOOLEAN
  "A date or datetime value"
  DATE
}

"""Base interface implemented by all graph-stored entities."""
interface Element {
  "Unique identifier"
  id: ID!
  "Display name"
  name: String!
  "Free-text description"
  description: String
}

"""Organizational folder for grouping models and controls."""
type Folder implements Element @authentication @node {
  "Unique identifier"
  id: ID! @id
  "Folder name"
  name: String!
  "Free-text description"
  description: String
  "Parent folder (if nested)"
  parentFolder: [Folder!]! @relationship(type: "FOLDER_CONTAINS", direction: IN)
  "Child folders"
  childrenFolders: [Folder!]! @relationship(type: "FOLDER_CONTAINS", direction: OUT)
  "Models in this folder"
  models: [Model!]! @relationship(type: "FOLDER_CONTAINS", direction: OUT)
  "Controls in this folder"
  controls: [Control!]! @relationship(type: "FOLDER_CONTAINS", direction: OUT)
}

"""A threat model containing components, data flows, boundaries, and analysis results."""
type Model implements Element  @authentication @node {
  "Unique identifier"
  id: ID! @id
  "Model name"
  name: String!
  "Free-text description"
  description: String
  "Top-level security boundaries in this model"
  defaultBoundary: [SecurityBoundary!]! @relationship(type: "CONTAINS", direction: OUT)
  "Modules loaded for this model"
  modules: [Module!]! @relationship(type: "HAS_MODULE", direction: OUT)
  "Controls applied to this model"
  controls: [Control!]! @relationship(type: "SUPPORTS", direction: IN)
  "Data elements defined in this model"
  dataItems: [Data!]! @relationship(type: "CONTAINS", direction: OUT)
  "Components that represent this model (for model-in-model composition)"
  representedBy: [Element!]! @relationship(type: "REPRESENTS_MODEL", direction: IN)
  "Analyses run against this model"
  analyses: [Analysis!]! @relationship(type: "ANALYZED_BY", direction: OUT)
  "Issues associated with this model"
  issues: [Issue!]! @relationship(type: "HAS_ISSUE", direction: OUT)
  "Folder containing this model"
  folder: [Folder!]! @relationship(type: "FOLDER_CONTAINS", direction: IN)
}

"""A modeled entity in the system (process, database, external entity, etc.)."""
type Component implements Element  @authentication @node {
  "Unique identifier"
  id: ID! @id
  "Component name"
  name: String!
  "Free-text description"
  description: String
  "Component type (process, store, external entity, etc.)"
  type: ComponentType!
  "Security boundary this component belongs to"
  parentBoundary: [SecurityBoundary!]! @relationship(type: "BELONGS_TO", direction: OUT)
  "Outgoing data flows from this component"
  flowsFrom: [DataFlow!]! @relationship(type: "FLOWS", direction: OUT)
  "Incoming data flows to this component"
  flowsTo: [DataFlow!]! @relationship(type: "FLOWS", direction: IN)
  "Security exposures identified on this component"
  exposures: [Exposure!]! @relationship(type: "HAS_EXPOSURE", direction: OUT)
  "Controls applied to this component"
  controls: [Control!]! @relationship(type: "SUPPORTS", direction: IN)
  "Data elements handled by this component"
  dataItems: [Data!]! @relationship(type: "HANDLES", direction: OUT)
  "Class this component is an instance of"
  componentClass: [ComponentClass!]! @relationship(type: "IS_INSTANCE_OF", direction: OUT)
  "Model represented by this component (for model-in-model composition)"
  representedModel: [Model!]! @relationship(type: "REPRESENTS_MODEL", direction: OUT)
  "Analyses run against this component"
  analyses: [Analysis!]! @relationship(type: "ANALYZED_BY", direction: OUT)
  "Issues associated with this component"
  issues: [Issue!]! @relationship(type: "HAS_ISSUE", direction: OUT)
  "X position on the canvas"
  positionX: Float
  "Y position on the canvas"
  positionY: Float
  "Width on the canvas"
  dimensionsWidth: Float
  "Height on the canvas"
  dimensionsHeight: Float
}

"""A directed data flow between two components."""
type DataFlow implements Element  @authentication @node {
  "Unique identifier"
  id: ID! @id
  "Data flow name"
  name: String!
  "Free-text description"
  description: String
  "Source component of this data flow"
  source: [Component!]! @relationship(type: "FLOWS", direction: IN)
  "Target component of this data flow"
  target: [Component!]! @relationship(type: "FLOWS", direction: OUT)
  "Source handle identifier (for canvas rendering)"
  sourceHandle: String
  "Target handle identifier (for canvas rendering)"
  targetHandle: String
  "Data flow protocol or transport types (e.g., HTTP, gRPC)"
  dataFlowTypes: [String!]
  "Analyses run against this data flow"
  analyses: [Analysis!]! @relationship(type: "ANALYZED_BY", direction: OUT)
  "Security exposures identified on this data flow"
  exposures: [Exposure!]! @relationship(type: "HAS_EXPOSURE", direction: OUT)
  "Controls applied to this data flow"
  controls: [Control!]! @relationship(type: "SUPPORTS", direction: IN)
  "Data elements carried by this data flow"
  dataItems: [Data!]! @relationship(type: "HANDLES", direction: OUT)
  "Class this data flow is an instance of"
  dataFlowClass: [DataFlowClass!]! @relationship(type: "IS_INSTANCE_OF", direction: OUT)
  "Issues associated with this data flow"
  issues: [Issue!]! @relationship(type: "HAS_ISSUE", direction: OUT)
}

"""A trust boundary separating zones of different trust levels (e.g., network boundary, DMZ)."""
type SecurityBoundary implements Element  @authentication @node {
  "Unique identifier"
  id: ID! @id
  "Boundary name"
  name: String!
  "Free-text description"
  description: String
  "Model this boundary belongs to"
  model: [Model!]! @relationship(type: "CONTAINS", direction: IN)
  "Trust level of this boundary (untrusted, semi-trusted, trusted)"
  trustLevel: TrustLevel!
  "Components inside this boundary"
  components: [Component!]! @relationship(type: "BELONGS_TO", direction: IN)
  "Nested child boundaries"
  childBoundaries: [SecurityBoundary!]! @relationship(type: "BELONGS_TO", direction: IN)
  "Parent boundary (if nested)"
  parentBoundary: [SecurityBoundary!]! @relationship(type: "BELONGS_TO", direction: OUT)
  "Security exposures identified on this boundary"
  exposures: [Exposure!]! @relationship(type: "HAS_EXPOSURE", direction: OUT)
  "Controls applied to this boundary"
  controls: [Control!]! @relationship(type: "SUPPORTS", direction: IN)
  "Data elements handled within this boundary"
  dataItems: [Data!]! @relationship(type: "HANDLES", direction: OUT)
  "Class this boundary is an instance of"
  securityBoundaryClass: [SecurityBoundaryClass!]! @relationship(type: "IS_INSTANCE_OF", direction: OUT)
  "Model represented by this boundary (for model-in-model composition)"
  representedModel: [Model!]! @relationship(type: "REPRESENTS_MODEL", direction: OUT)
  "Analyses run against this boundary"
  analyses: [Analysis!]! @relationship(type: "ANALYZED_BY", direction: OUT)
  "Issues associated with this boundary"
  issues: [Issue!]! @relationship(type: "HAS_ISSUE", direction: OUT)
  "X position on the canvas"
  positionX: Float
  "Y position on the canvas"
  positionY: Float
  "Width on the canvas"
  dimensionsWidth: Float
  "Height on the canvas"
  dimensionsHeight: Float
  "Minimum width on the canvas"
  dimensionsMinWidth: Float
  "Minimum height on the canvas"
  dimensionsMinHeight: Float
  "All nested boundaries at any depth (computed via Cypher traversal)"
  allDescendantBoundaries: [SecurityBoundary!]!
    @cypher(
      statement: """
      MATCH (this)<-[:BELONGS_TO*1..10]-(sb:SecurityBoundary)
      RETURN DISTINCT sb
      """,
      columnName: "sb"
    )
  "All components inside this boundary or any nested boundary (computed)"
  allDescendantComponents: [Component!]!
    @cypher(
      statement: """
      MATCH (this)<-[:BELONGS_TO*0..10]-(sb:SecurityBoundary)
      WITH DISTINCT sb
      MATCH (sb)<-[:BELONGS_TO]-(c:Component)
      RETURN DISTINCT c
      """,
      columnName: "c"
    )
  "All data flows touching components in this boundary or nested boundaries (computed)"
  allDescendantDataFlows: [DataFlow!]!
    @cypher(
      statement: """
      MATCH (this)<-[:BELONGS_TO*0..10]-(sb:SecurityBoundary)
      WITH DISTINCT sb
      MATCH (sb)<-[:BELONGS_TO]-(c:Component)
      WITH DISTINCT c
      MATCH (c)-[:FLOWS]-(df:DataFlow)
      RETURN DISTINCT df
      """,
      columnName: "df"
    )
}

"""A data element handled by components and data flows (e.g., PII, credentials, API keys)."""
type Data implements Element  @authentication @node {
  "Unique identifier"
  id: ID! @id
  "Data element name"
  name: String!
  "Free-text description"
  description: String
  "Model this data element belongs to"
  model: [Model!]! @relationship(type: "CONTAINS", direction: IN)
  "Class this data element is an instance of"
  dataClass: [DataClass!]! @relationship(type: "IS_INSTANCE_OF", direction: OUT)
  "Components that handle this data"
  component: [Component!]! @relationship(type: "HANDLES", direction: IN)
  "Data flows that carry this data"
  dataFlow: [DataFlow!]! @relationship(type: "HANDLES", direction: IN)
  "Boundaries that contain this data"
  securityBoundary: [SecurityBoundary!]! @relationship(type: "HANDLES", direction: IN)
  "All elements that handle this data"
  elements: [Element!]! @relationship(type: "HANDLES", direction: IN)
  "Security exposures related to this data"
  exposures: [Exposure!]! @relationship(type: "HAS_EXPOSURE", direction: OUT)
  "Analyses involving this data"
  analyses: [Analysis!]! @relationship(type: "ANALYZED_BY", direction: OUT)
  "Issues associated with this data"
  issues: [Issue!]! @relationship(type: "HAS_ISSUE", direction: OUT)
}

"""A security control applied to one or more elements (e.g., encryption, authentication, firewall rule)."""
type Control implements Element  @authentication @node {
  "Unique identifier"
  id: ID! @id
  "Control name"
  name: String!
  "Free-text description"
  description: String
  "Control type (e.g., technical, procedural, administrative)"
  type: String
  "Control category"
  category: String
  "Class this control is an instance of"
  controlClasses: [ControlClass!]! @relationship(type: "IS_INSTANCE_OF", direction: OUT)
  "Elements this control is applied to"
  elements: [Element!]! @relationship(type: "SUPPORTS", direction: OUT)
  "Countermeasures provided by this control"
  countermeasures: [Countermeasure!]! @relationship(type: "HAS_COUNTERMEASURE", direction: OUT)
  "Folder containing this control"
  folder: [Folder!]! @relationship(type: "FOLDER_CONTAINS", direction: IN)
  "Analyses involving this control"
  analyses: [Analysis!]! @relationship(type: "ANALYZED_BY", direction: OUT)
  "Issues associated with this control"
  issues: [Issue!]! @relationship(type: "HAS_ISSUE", direction: OUT)
}

"""An executable module that provides component classes, analysis logic, controls, and other domain-specific functionality."""
type Module implements Element  @authentication @node {
  "Unique identifier"
  id: ID! @id
  "Module name"
  name: String!
  "Module version"
  version: String!
  "Free-text description"
  description: String
  "Models this module is loaded in"
  model: [Model!]! @relationship(type: "HAS_MODULE", direction: IN)
  "Component classes provided by this module"
  componentClasses: [ComponentClass!]! @relationship(type: "HAS_CLASS", direction: OUT)
  "Data flow classes provided by this module"
  dataFlowClasses: [DataFlowClass!]! @relationship(type: "HAS_CLASS", direction: OUT)
  "Security boundary classes provided by this module"
  securityBoundaryClasses: [SecurityBoundaryClass!]! @relationship(type: "HAS_CLASS", direction: OUT)
  "Control classes provided by this module"
  controlClasses: [ControlClass!]! @relationship(type: "HAS_CLASS", direction: OUT)
  "Data classes provided by this module"
  dataClasses: [DataClass!]! @relationship(type: "HAS_CLASS", direction: OUT)
  "Analysis classes provided by this module"
  analysisClasses: [AnalysisClass!]! @relationship(type: "HAS_CLASS", direction: OUT)
  "Module configuration template (resolved at runtime)"
