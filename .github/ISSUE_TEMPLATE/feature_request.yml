name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: problem-motivation
    attributes:
      label: Problem / Motivation
      description: A clear description of the problem or motivation for this feature.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you would like to see.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component of Dethernety does this relate to?
      options:
        - Frontend (dt-ui)
        - Backend (dt-ws)
        - Module SDK (dt-module)
        - MCP Server (dethereal)
        - Documentation
        - Other
    validations:
      required: false

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you have considered.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or references here.
    validations:
      required: false
