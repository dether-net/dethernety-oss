name: Security Review

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/*/src/**'
      - 'packages/*/src/**'
      - 'modules/*/src/**'
      - 'Dockerfile*'
      - '*.config.*'

permissions:
  pull-requests: write
  contents: read
  id-token: write

jobs:
  security-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Claude security review
        uses: anthropics/claude-code-action@main
        with:
          prompt: >-
            Review this PR for security vulnerabilities. Focus on:
            authentication bypass, injection attacks, credential leakage,
            SSRF, XSS, and module sandbox escape. Flag any issues found.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
