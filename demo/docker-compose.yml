# Dethernety Demo — minimal 3-service stack (no authentication)
#
# Usage:
#   cd oss/demo
#   ./demo.sh   # builds, starts, and installs modules
#
# Services:
#   - memgraph:   Graph database (Bolt on port 7687)
#   - opa:        Open Policy Agent (port 8181)
#   - dethernety: Application UI + API (port 3003)
#
# Authentication is DISABLED — this is for local evaluation only.
# For production, deploy with an OIDC provider (see docs).

services:
  # --- Graph database ---------------------------------------------------
  memgraph:
    image: memgraph/memgraph-mage:3.6.2
    container_name: demo-memgraph
    networks:
      - demo-network
    ports:
      - "7687:7687"
    command:
      - "--bolt-num-workers=4"
      - "--query-plan-cache-max-size=100"
      - "--query-execution-timeout-sec=600"
      - "--query-max-plans=100"
      - "--cartesian-product-enabled=true"
      - "--storage-gc-cycle-sec=300"
      - "--memory-limit=4096"
      - "--query-vertex-count-to-expand-existing=10"
    volumes:
      - ./data/memgraph_data:/var/lib/memgraph
      - ./data/memgraph_log:/var/log/memgraph
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      stack:
        soft: -1
        hard: -1
      memlock:
        soft: -1
        hard: -1
    mem_limit: 3g
    mem_reservation: 3g
    shm_size: 2g
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole -username dethernety -password demo || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 0s
    environment:
      - MEMGRAPH_USER=dethernety
      - MEMGRAPH_PASSWORD=demo

  # --- Policy engine ----------------------------------------------------
  opa:
    image: openpolicyagent/opa:latest
    container_name: demo-opa
    ports:
      - "8181:8181"
    command: ["run", "--server", "--addr", "0.0.0.0:8181"]
    networks:
      - demo-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8181/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # --- Dethernety application -------------------------------------------
  dethernety:
    image: dethernety:demo
    container_name: demo-dethernety
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - PORT=3003
      # Database
      - NEO4J_URI=bolt://memgraph:7687
      - NEO4J_USERNAME=dethernety
      - NEO4J_PASSWORD=demo
      - NEO4J_ENCRYPTED=false
      - NEO4J_DATABASE=memgraph
      - NEO4J_TRUST_CERT=true
      # Policy engine
      - OPA_URL=http://opa:8181
      - OPA_COMPILE_SERVER_URL=http://opa:8181
      # GraphQL
      - GQL_ENABLE_SUBSCRIPTIONS=true
      - GQL_QUERY_DEPTH_LIMIT=10
      - GQL_QUERY_COMPLEXITY_LIMIT=1000
      # Modules
      - CUSTOM_MODULES_PATH=custom_modules
      - ALLOWED_MODULES=*
      - ENABLE_MODULE_HOT_RELOAD=false
      # Auth-less mode — deliberate opt-in (no OIDC provider needed for demo)
      - ENABLE_NOAUTH=true
    depends_on:
      memgraph:
        condition: service_healthy
      opa:
        condition: service_started
    networks:
      - demo-network
    volumes:
      - ./modules:/app/apps/dt-ws/custom_modules:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health/simple', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  demo-network:
    driver: bridge
